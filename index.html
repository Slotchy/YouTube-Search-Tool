<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #000000;
            color: #e5e5e5;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: #e5e5e5;
            border-radius: 50%;
            opacity: 0.6;
            animation: float linear infinite;
        }

        @keyframes float {
            from { transform: translateX(0); }
            to { transform: translateX(100vw); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: #8b5cf6;
            margin-bottom: 40px;
            font-size: 2.5em;
        }

        .input-section {
            background: #1e1e28;
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #8b5cf6;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a1a1aa;
            font-size: 14px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #1e1e28;
            border: 2px solid #8b5cf6;
            border-radius: 4px;
            color: #e5e5e5;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #a78bfa;
        }

        input::placeholder {
            color: #a1a1aa;
        }

        .mode-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 30px;
            background: #1e1e28;
            border: 2px solid #8b5cf6;
            border-radius: 4px;
            color: #e5e5e5;
            cursor: pointer;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            background: #272733;
        }

        .mode-btn.active {
            background: #8b5cf6;
            border-color: #8b5cf6;
        }

        .search-btn {
            width: 100%;
            padding: 16px;
            background: #8b5cf6;
            border: none;
            border-radius: 6px;
            color: #e5e5e5;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        .search-btn:hover {
            background: #a78bfa;
        }

        .search-btn:disabled {
            background: #4c4c5c;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
            min-height: 20px;
        }

        .status.error {
            color: #ef4444;
        }

        .status.success {
            color: #8b5cf6;
        }

        .status.info {
            color: #a1a1aa;
        }

        .results {
            margin-top: 40px;
        }

        .result-card {
            background: #1e1e28;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .result-card:hover {
            border-color: #272733;
            transform: translateY(-2px);
        }

        .result-title {
            color: #e5e5e5;
            font-size: 16px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .result-time {
            color: #a1a1aa;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .result-link {
            color: #8b5cf6;
            font-size: 14px;
            text-decoration: none;
            word-break: break-all;
        }

        .result-link:hover {
            text-decoration: underline;
        }

        .api-key-toggle {
            display: inline-block;
            margin-left: 10px;
            color: #8b5cf6;
            cursor: pointer;
            font-size: 12px;
            text-decoration: underline;
        }

        .api-key-toggle:hover {
            color: #a78bfa;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .mode-buttons {
                flex-direction: column;
            }

            .mode-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>YouTube Search</h1>
        
        <div class="input-section">
            <div class="input-group">
                <label for="apiKey">
                    YouTube API Key 
                    <span class="api-key-toggle" onclick="toggleApiKeyVisibility()">show/hide</span>
                </label>
                <input type="password" id="apiKey" placeholder="Paste your YouTube API key here">
            </div>

            <div class="input-group">
                <label for="searchQuery">Search Topic</label>
                <input type="text" id="searchQuery" placeholder="Enter search topic" maxlength="44">
            </div>

            <div class="mode-buttons">
                <button class="mode-btn active" id="videosBtn" onclick="setMode('videos')">Videos</button>
                <button class="mode-btn" id="livestreamsBtn" onclick="setMode('livestreams')">Livestreams</button>
            </div>

            <button class="search-btn" id="searchBtn" onclick="searchYouTube()">Find Most Recent</button>
        </div>

        <div class="status" id="status"></div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let currentMode = 'videos';
        let showApiKey = false;

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 100; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * -20 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 10) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        // Load saved API key on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('youtube_api_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
            createParticles();

            // Enable search on Enter key
            document.getElementById('searchQuery').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchYouTube();
                }
            });
        });

        function toggleApiKeyVisibility() {
            const input = document.getElementById('apiKey');
            showApiKey = !showApiKey;
            input.type = showApiKey ? 'text' : 'password';
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('videosBtn').classList.toggle('active', mode === 'videos');
            document.getElementById('livestreamsBtn').classList.toggle('active', mode === 'livestreams');
        }

        function setStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        function timeAgo(dateString) {
            if (!dateString) return '?';
            try {
                const date = new Date(dateString);
                const now = new Date();
                const seconds = Math.max(0, Math.floor((now - date) / 1000));
                
                if (seconds < 60) return `${seconds} seconds ago`;
                const minutes = Math.floor(seconds / 60);
                if (minutes < 60) return `${minutes} minutes ago`;
                const hours = Math.floor(minutes / 60);
                if (hours < 24) return `${hours} hours ago`;
                const days = Math.floor(hours / 24);
                if (days === 1) return '1 day ago';
                return `${days} days ago`;
            } catch {
                return '?';
            }
        }

        async function searchYouTube() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const query = document.getElementById('searchQuery').value.trim();
            
            if (!apiKey) {
                setStatus('Please enter your API key', 'error');
                return;
            }

            if (!query) {
                setStatus('Please enter a search topic', 'error');
                return;
            }

            // Save API key to localStorage
            localStorage.setItem('youtube_api_key', apiKey);

            // Disable button and show searching status
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = 'Searching...';
            setStatus('Searching...', 'info');

            // Clear previous results
            document.getElementById('results').innerHTML = '';

            try {
                // Build the YouTube API URL
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&order=date&maxResults=50&key=${apiKey}`;
                
                if (currentMode === 'livestreams') {
                    url += '&eventType=live';
                }

                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    setStatus('Invalid API Key or quota exceeded', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Find Most Recent';
                    return;
                }

                const items = data.items || [];
                
                if (items.length === 0) {
                    setStatus('No results found', 'info');
                    btn.disabled = false;
                    btn.textContent = 'Find Most Recent';
                    return;
                }

                setStatus(`Found ${items.length} results`, 'success');

                // Display results
                const resultsContainer = document.getElementById('results');
                items.forEach(item => {
                    if (!item.id.videoId) return;

                    const card = document.createElement('div');
                    card.className = 'result-card';
                    
                    const title = document.createElement('div');
                    title.className = 'result-title';
                    title.textContent = item.snippet.title;

                    const time = document.createElement('div');
                    time.className = 'result-time';
                    time.textContent = timeAgo(item.snippet.publishedAt);

                    const link = document.createElement('a');
                    link.className = 'result-link';
                    link.href = `https://youtu.be/${item.id.videoId}`;
                    link.textContent = `https://youtu.be/${item.id.videoId}`;
                    link.target = '_blank';
                    link.onclick = (e) => e.stopPropagation();

                    card.appendChild(title);
                    card.appendChild(time);
                    card.appendChild(link);

                    card.onclick = () => {
                        window.open(`https://youtu.be/${item.id.videoId}`, '_blank');
                    };

                    resultsContainer.appendChild(card);
                });

            } catch (error) {
                setStatus('Search failed - check your API key and connection', 'error');
                console.error(error);
            }

            btn.disabled = false;
            btn.textContent = 'Find Most Recent';
        }
    </script>
</body>
</html>
